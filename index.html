<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificação</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #fff;
      border: 1px solid #d3d3d3;
      border-radius: 4px;
      padding: 16px 20px;
      width: 300px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #c1c1c1;
      border-radius: 2px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .checkbox svg {
      display: none;
      width: 16px;
      height: 16px;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid #c1c1c1;
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    label {
      font-size: 14px;
      color: #333;
      cursor: pointer;
      user-select: none;
    }

    .logo {
      text-align: center;
      font-size: 8px;
      color: #999;
      line-height: 1.4;
    }

    .logo span {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: #4a90d9;
      letter-spacing: 0.5px;
    }

    /* Resultado */
    .result {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: bold;
      align-items: center;
      gap: 10px;
    }

    .result.humano {
      background: #e6f4ea;
      border: 1px solid #b0d9b1;
      color: #2e7d32;
    }

    .result.robo {
      background: #fdecea;
      border: 1px solid #f5b4b4;
      color: #c62828;
    }

    .result svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .retry {
      display: none;
      margin-top: 10px;
      background: none;
      border: none;
      font-size: 12px;
      color: #777;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="row">
    <div class="left" onclick="verificar()">
      <div class="checkbox" id="checkbox">
        <div class="spinner" id="spinner"></div>
        <svg id="checkIcon" viewBox="0 0 24 24" fill="none" stroke="#4a90d9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <label>Não sou um robô</label>
    </div>
    <div class="logo">
      <span>reCAPTCHA</span>
      Privacidade · Termos
    </div>
  </div>

  <div class="result humano" id="resHumano">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
    Humano verificado!
  </div>

  <div class="result robo" id="resRobo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="8" width="18" height="12" rx="2"/>
      <path d="M9 8V6a3 3 0 016 0v2"/>
      <circle cx="9" cy="14" r="1.5" fill="currentColor"/>
      <circle cx="15" cy="14" r="1.5" fill="currentColor"/>
      <path d="M12 2v2"/>
    </svg>
    Parece que você é um robô.
  </div>

  <button class="retry" id="retry" onclick="reiniciar()">Tentar novamente</button>
</div>

<script>
  
  let ativo = false;

  function verificar() {
    if (ativo) return;
    ativo = true;

    document.getElementById('spinner').style.display = 'block';

    setTimeout(function () {
      document.getElementById('spinner').style.display = 'none';

      const humano = Math.random() > 0.25;

      if (humano) {
        document.getElementById('checkbox').style.borderColor = '#4a90d9';
        document.getElementById('checkIcon').style.display = 'block';
        document.getElementById('resHumano').style.display = 'flex';

        setTimeout(function () {
          window.location.href = 'shopee.html';
        }, 1500);

      } else {
        document.getElementById('checkbox').style.borderColor = '#c62828';
        document.getElementById('resRobo').style.display = 'flex';
        document.getElementById('retry').style.display = 'block';
      }

    }, 1200);
  }

  function reiniciar() {
    ativo = false;
    document.getElementById('checkbox').style.borderColor = '#c1c1c1';
    document.getElementById('checkIcon').style.display = 'none';
    document.getElementById('resHumano').style.display = 'none';
    document.getElementById('resRobo').style.display = 'none';
    document.getElementById('retry').style.display = 'none';
  }

</script>

</body>
</html>
